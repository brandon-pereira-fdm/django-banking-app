{% load banking_extras %}
<article class="transaction-row {{ transaction.transaction_type|lower }}">
  <div>
    <strong>{{ transaction.get_transaction_type_display }}</strong>
    <span>{{ transaction.completed_at }}</span>
  </div>
  <div>
    <span>{{ transaction.amount|sgd }}</span>
    <small>ID {{ transaction.transaction_id }}</small>
    {% if transaction.transfer_operation %}
      <small>Transfer {{ transaction.transfer_operation.transfer_operation_id }}</small>
    {% endif %}
  </div>
</article>
