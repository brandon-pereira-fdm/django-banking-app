{% extends "base.html" %}
{% block content %}
<section class="page-header"><h1>Open Personal Account</h1><p>No opening deposit is required. Your account begins at SGD 0.00.</p></section>
{% include "components/field_errors.html" %}
<form method="post" class="form-card">{% csrf_token %}
  {% for field in form %}<label for="{{ field.id_for_label }}">{{ field.label }}</label>{{ field }}{% endfor %}
  <button class="button" type="submit">Open Personal Account</button>
</form>
{% endblock %}
