{% extends "base.html" %}
{% block content %}
<section class="page-header"><h1>Transfer</h1><p>Select the recipient type first: Personal uses phone number, Business uses UEN.</p></section>
{% include "components/field_errors.html" %}
<form method="post" class="form-card">{% csrf_token %}{% for field in form %}<label for="{{ field.id_for_label }}">{{ field.label }}</label>{{ field }}{% endfor %}<button class="button" type="submit">Review Transfer</button></form>
{% endblock %}
