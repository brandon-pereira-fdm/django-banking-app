{% extends base_template %}
{% block content %}
<section class="form-panel">
  <p class="eyebrow">{{ scope }}</p>
  <h1>{{ title }}</h1>
  <form method="post" novalidate>
    {% csrf_token %}
    {% include "includes/form_errors.html" %}
    {{ form.as_p }}
    <button class="button primary" type="submit">{{ title }}</button>
  </form>
</section>
{% endblock %}
