{% extends "base_business.html" %}
{% block content %}
<section class="form-panel">
  <p class="eyebrow">Team Access</p>
  <h1>Add Employee Access</h1>
  <p>The employee must change this temporary password on first sign-in before accessing account functions.</p>
  <form method="post" novalidate>
    {% csrf_token %}
    {% include "includes/form_errors.html" %}
    {{ form.as_p }}
    <button class="button primary" type="submit">Create Employee Access</button>
  </form>
</section>
{% endblock %}
