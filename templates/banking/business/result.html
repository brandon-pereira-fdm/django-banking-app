{% extends "base_business.html" %}
{% load banking_extras %}
{% block content %}
<section class="card">
  <h1>{{ title }}</h1>
  {% if transaction %}
    <p>Transaction ID: {{ transaction.transaction_id }}</p>
    <p>Amount: {{ transaction.amount|sgd }}</p>
    <p>Status: <span class="badge completed">COMPLETED</span></p>
  {% endif %}
</section>
{% endblock %}
